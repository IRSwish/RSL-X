<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[BETA] Fusions - RSL-X</title>
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <script src="/config/site-config.js"></script>
  <script src="/config/ad-banner.js" defer></script>
  <link rel="stylesheet" href="/style/style.css">
  <link rel="stylesheet" href="/fusions/beta/fusions-sidebar.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <!-- BETA-ONLY STYLES — modifier ici librement -->
  <style>
    /* ===== ZONE DE TEST BETA ===== */

    /* Hauteur auto — flex colonne */
    .event-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 8px;
      overflow: hidden;
    }

    /* Reward boxes — mini cards horizontales */
    .points-container {
      gap: 5px;
      flex-wrap: nowrap;
    }
    .point-box {
      flex-direction: row;
      align-items: stretch;
      flex: 0 0 auto;
      width: 48px;
      max-width: none;
      min-width: unset;
      height: 30px;
      padding: 0;
      border-radius: 6px;
      overflow: hidden;
      border: 2px solid rgba(212, 175, 55, 0.25);
      box-shadow: none;
    }
    .event-block .point-box img {
      width: 26px;
      height: 100% !important;
      min-height: unset !important;
      max-height: none !important;
      min-width: 26px;
      max-width: 26px;
      align-self: stretch;
      object-fit: cover;
      flex: none;
    }
    .point-box span {
      margin-top: 0;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      background: #d0d0d0;
      color: #111;
    }
    /* Bandeau coloré selon état */
    .point-box.state-validated span { background: #4caf50; color: #111; }
    .point-box.state-ongoing span   { background: #ffa500; color: #111; }
    .point-box.state-passed span    { background: #ff3333; color: #fff; }
    .point-box.state-upcoming span  { background: #d0d0d0; color: #111; }

    /* Titres des blocs */
    .event-name {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
      width: 100%;
    }

    /* Tournament — fond bleu subtil */
    .event-block.type-tournament {
      background: rgba(30, 60, 140, 0.18);
      border-color: rgba(90, 140, 220, 0.5);
    }
    .event-block.type-tournament .event-name {
      color: #8aaee0;
    }

    /* Event — fond vert subtil */
    .event-block.type-event {
      background: rgba(15, 90, 40, 0.18);
      border-color: rgba(60, 170, 100, 0.5);
    }
    .event-block.type-event .event-name {
      color: #72c497;
    }

    /* Séparateur de section */
    .section-separator {
      position: absolute;
      left: 0;
      right: 0;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 2;
    }
    .section-separator::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
    }
    .section-separator[data-section="tournament"]::before {
      background: rgba(90, 140, 220, 0.3);
    }
    .section-separator[data-section="event"]::before {
      background: rgba(60, 170, 100, 0.3);
    }
    .section-separator-label {
      position: relative;
      background: #111;
      padding: 3px 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 20px;
    }
    .section-separator[data-section="tournament"] .section-separator-label {
      color: rgba(90, 140, 220, 0.7);
      border: 1px solid rgba(90, 140, 220, 0.25);
    }
    .section-separator[data-section="event"] .section-separator-label {
      color: rgba(60, 170, 100, 0.7);
      border: 1px solid rgba(60, 170, 100, 0.25);
    }
  </style>
  <link rel="preload" href="/menu.html" as="fetch" crossorigin>
</head>
<body>
  <!-- MENU -->
  <div id="menu-container"></div>

  <!-- Info button -->
  <button id="info-btn" class="info-btn" aria-label="Infos">
    <i data-lucide="info"></i>
  </button>

  <div class="header-wrapper">
    <header id="page-title"></header>
  </div>

  <div class="timeline-container" id="timeline-container">
    <div class="timeline"></div>
  </div>

  <!-- Sidebar -->
  <div id="info-sidebar">
    <!-- LEGEND -->
    <div class="panel">
      <div class="panel-header">Legend</div>
      <div class="panel-body">
        <div class="legend">
          <div><span class="legend-dot skipped"></span> Skipped</div>
          <div><span class="legend-dot in-progress"></span> Planned</div>
          <div><span class="legend-dot done"></span> Done</div>
          <div><span class="legend-dot not-started"></span> Not started</div>
        </div>
      </div>
    </div>

    <!-- PROGRESS -->
    <div class="panel">
      <div class="panel-header">Progress</div>
      <div class="panel-body progress-panel" id="progress-panel"></div>
    </div>

    <!-- RESOURCES -->
    <div class="panel" id="resources-panel-wrapper" style="display:none">
      <div class="panel-header">Resources</div>
      <div class="panel-body" id="resources-panel"></div>
    </div>
  </div>

  <!-- Pinned panels (bottom-left) -->
  <div id="pinned-area">
    <div id="pinned-legend" class="pinned-panel">
      <div class="panel">
        <div class="panel-header">Legend</div>
        <div class="panel-body">
          <div class="legend">
            <div><span class="legend-dot skipped"></span> Skipped</div>
            <div><span class="legend-dot in-progress"></span> Planned</div>
            <div><span class="legend-dot done"></span> Done</div>
            <div><span class="legend-dot not-started"></span> Not started</div>
          </div>
        </div>
      </div>
    </div>
    <div id="pinned-progress" class="pinned-panel">
      <div class="panel">
        <div class="panel-header">Progress</div>
        <div class="panel-body progress-panel" id="pinned-progress-panel"></div>
      </div>
    </div>
  </div>

  <!-- Pin toggle buttons (bottom-left) -->
  <div id="pin-toggles">
    <button type="button" class="pin-toggle-btn" id="pin-legend-btn" title="Pin Legend">
      <i data-lucide="map"></i>
      <span>Legend</span>
    </button>
    <button type="button" class="pin-toggle-btn" id="pin-progress-btn" title="Pin Progress">
      <i data-lucide="bar-chart-3"></i>
      <span>Progress</span>
    </button>
  </div>

  <!-- Scripts beta (copies locales modifiables) -->
  <script src="/fusions/beta/fusions-config.js"></script>
  <script src="/fusions/beta/fusion.js"></script>
  <script src="/script.js"></script>
  <script src="/fusions/beta/init.js"></script>

</body>
</html>
