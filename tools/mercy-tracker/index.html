  <style>
    @font-face {
      font-family: "Middle Ages";
      src: url('/style/MiddAges.ttf') format('truetype');
      font-display: swap;
    }

    * { box-sizing: border-box; }

    /* ── Background animé ── */
    .df-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .df-orb { position: absolute; border-radius: 50%; }
    .df-orb-1 { width: 70vmax; height: 70vmax; top: -15%; left: -15%; background: radial-gradient(circle, rgba(201,169,106,0.10) 0%, transparent 65%); filter: blur(65px); animation: orbDrift1 28s ease-in-out infinite alternate; }
    .df-orb-2 { width: 55vmax; height: 55vmax; bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(90,70,145,0.08) 0%, transparent 65%); filter: blur(75px); animation: orbDrift2 35s ease-in-out infinite alternate; }
    .df-orb-3 { width: 45vmax; height: 45vmax; top: 30%; left: 35%; background: radial-gradient(circle, rgba(160,88,38,0.07) 0%, transparent 60%); filter: blur(55px); animation: orbDrift3 22s ease-in-out infinite alternate; }
    .df-scratches {
      position: absolute; inset: -5%;
      background-image:
        repeating-linear-gradient(58deg, transparent 0px, transparent 172px, rgba(255,255,255,0.028) 172px, rgba(255,255,255,0.028) 172.5px),
        repeating-linear-gradient(45deg, transparent 0px, transparent 157px, rgba(255,255,255,0.032) 157px, rgba(255,255,255,0.032) 158px),
        repeating-linear-gradient(67deg, transparent 0px, transparent 167px, rgba(201,169,106,0.034) 167px, rgba(201,169,106,0.034) 167.5px),
        repeating-linear-gradient(78deg, transparent 0px, transparent 193px, rgba(201,169,106,0.030) 193px, rgba(201,169,106,0.030) 193.5px);
      animation: scratchShimmer 28s ease-in-out infinite alternate;
    }
    .df-noise { position: absolute; inset: 0; opacity: 0.4; mix-blend-mode: overlay; }
    .df-beam { position: absolute; top: -100%; left: -60%; width: 38%; height: 300%; background: linear-gradient(90deg, transparent 0%, rgba(201,169,106,0.014) 35%, rgba(201,169,106,0.028) 50%, rgba(201,169,106,0.014) 65%, transparent 100%); transform: rotate(15deg) translateX(-80vw); animation: beamSweep 24s ease-in-out infinite; }
    .df-embers { position: absolute; inset: 0; background-image: radial-gradient(circle at 12% 68%, rgba(201,169,106,0.18) 0 1px, transparent 2px), radial-gradient(circle at 76% 20%, rgba(201,169,106,0.15) 0 1px, transparent 2px), radial-gradient(circle at 52% 12%, rgba(201,169,106,0.12) 0 1.5px, transparent 2.5px), radial-gradient(circle at 88% 80%, rgba(201,169,106,0.10) 0 1px, transparent 2px); animation: embersFloat 11s ease-in-out infinite alternate; }

    body::before { display: none; }
    body { background: radial-gradient(circle at 20% 20%, rgba(110,85,45,0.08), transparent 30%), radial-gradient(circle at 80% 30%, rgba(80,70,120,0.08), transparent 28%), linear-gradient(160deg, #050505, #0c0b0a 45%, #14110f); }
    .header-wrapper { text-align: center; }

    /* ── Layout ── */
    .main-container { position: relative; width: min(1200px, 97%); margin: 32px auto 56px; padding: 0 16px; }

    /* ── Panel ── */
    .df-panel {
      position: relative; padding: 28px 28px;
      background: linear-gradient(180deg, rgba(22,18,16,0.96), rgba(8,7,7,0.94)), linear-gradient(135deg, rgba(201,169,106,0.06), rgba(255,255,255,0.03) 40%, transparent 70%);
      border: 1px solid rgba(255,228,170,0.14);
      box-shadow: 0 25px 70px rgba(0,0,0,0.75), inset 0 0 0 1px rgba(255,255,255,0.04), inset 0 0 30px rgba(201,169,106,0.05);
      overflow: visible;
    }
    .df-panel::before { content: ""; position: absolute; inset: 8px; border: 1px solid rgba(201,169,106,0.72); box-shadow: 0 0 8px rgba(201,169,106,0.22), 0 0 20px rgba(201,169,106,0.08), inset 0 0 10px rgba(201,169,106,0.06); animation: borderGlow 4.8s ease-in-out infinite; pointer-events: none; }
    .df-panel::after { content: ""; position: absolute; inset: 0; padding: 1px; background: linear-gradient(120deg, rgba(255,255,255,0.05), rgba(201,169,106,0.35), rgba(255,255,255,0.02), rgba(143,106,47,0.35)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0.7; pointer-events: none; }

    /* ── Ornements ── */
    .ornament { position: absolute; width: 70px; height: 70px; pointer-events: none; filter: drop-shadow(0 0 6px rgba(201,169,106,0.45)); }
    .top-left     { top: -20px; left: -20px; }
    .top-right    { top: -20px; right: -20px; transform: scaleX(-1); }
    .bottom-left  { bottom: -20px; left: -20px; transform: scaleY(-1); }
    .bottom-right { bottom: -20px; right: -20px; transform: scale(-1); }
    .sh-out { stroke-dasharray: 32 106; animation: shimOut 3s linear infinite; opacity: 0; }
    @keyframes shimOut { 0% { stroke-dashoffset: 32; opacity: 0; } 8% { opacity: 0.65; } 88% { opacity: 0.65; } 100% { stroke-dashoffset: -106; opacity: 0; } }
    .gem { animation: gemPulse 2.5s ease-in-out infinite; }
    @keyframes gemPulse { 0%, 100% { opacity: 0.88; } 50% { opacity: 1; } }
    .top-right .sh-out { animation-delay: -0.75s; } .bottom-left .sh-out { animation-delay: -1.5s; } .bottom-right .sh-out { animation-delay: -2.25s; }
    .top-right .gem    { animation-delay: -0.625s; } .bottom-left .gem    { animation-delay: -1.25s; } .bottom-right .gem    { animation-delay: -1.875s; }

    /* ── Section label / divider ── */
    .section-label { font-family: "Middle Ages", "Cormorant Garamond", serif; font-size: 0.85rem; text-transform: uppercase; color: rgba(241,221,177,0.75); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .section-label::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(201,169,106,0.5), transparent); }
    .section-divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(201,169,106,0.35), transparent); margin: 24px 0; }

    /* ── Import bar ── */
    .import-bar { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 4px; }
    .import-hint { font-family: 'Inter', sans-serif; font-size: 0.72rem; color: rgba(232,224,210,0.4); text-align: center; }
    .import-hint code { background: rgba(255,255,255,0.06); padding: 2px 6px; font-size: 0.68rem; }
    .import-btn {
      font-family: 'Inter', sans-serif;
      background: transparent;
      border: 1px solid rgba(201,169,106,0.45);
      color: #c9a96a;
      padding: 9px 20px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      display: flex; align-items: center; gap: 8px;
    }
    .import-btn:hover { background: rgba(201,169,106,0.12); border-color: #c9a96a; color: #f1ddb1; }
    .import-btn svg { width: 16px; height: 16px; }
    #importFileInput { display: none; }

    /* ── Cards grid ── */
    .shards-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; width: 100%; }

    /* ── Shard card ── */
    .shard-card {
      background: rgba(0,0,0,0.32);
      border: 1px solid rgba(201,169,106,0.2);
      padding: 20px;
      transition: border-color 0.2s;
    }
    .shard-card:hover { border-color: rgba(201,169,106,0.42); }

    /* ── Card header ── */
    .card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid rgba(201,169,106,0.1); }
    .shard-icon { width: 48px; height: 60px; object-fit: contain; filter: drop-shadow(0 0 8px rgba(201,169,106,0.3)); }
    .card-title-block { flex: 1; }
    .shard-name { font-family: "Middle Ages", "Cormorant Garamond", serif; font-size: 1.1rem; color: #f1ddb1; margin-bottom: 2px; }
    .shard-type { font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 600; color: rgba(201,169,106,0.65); text-transform: uppercase; }

    /* ── Progress rings ── */
    .progress-section { display: flex; justify-content: center; gap: 14px; margin-bottom: 14px; }
    .ring-wrapper { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .ring-container { position: relative; width: 100px; height: 100px; }
    .progress-ring-svg { transform: rotate(-90deg); width: 100px; height: 100px; }
    .ring-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 8; }
    .ring-progress { fill: none; stroke: #c9a96a; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.3s ease; }
    .ring-value { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
    .ring-input { font-family: 'Inter', sans-serif; font-size: 1.2rem; font-weight: 700; color: #f1ddb1; background: transparent; border: none; width: 55px; text-align: center; outline: none; }
    .ring-label { font-family: 'Inter', sans-serif; font-size: 0.65rem; font-weight: 600; color: rgba(232,224,210,0.5); text-transform: uppercase; }

    /* ── Controls ── */
    .controls { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; }
    .ctrl-btn {
      font-family: 'Inter', sans-serif;
      background: transparent;
      border: 1px solid rgba(201,169,106,0.3);
      color: rgba(232,224,210,0.8);
      width: 36px; height: 36px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
      display: flex; align-items: center; justify-content: center;
    }
    .ctrl-btn:hover:not(:disabled) { background: rgba(201,169,106,0.15); border-color: #c9a96a; color: #f1ddb1; }
    .ctrl-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .ctrl-btn.wide { width: 48px; font-size: 0.85rem; }
    .ctrl-btn.reset { border-color: rgba(201,169,106,0.4); color: rgba(201,169,106,0.7); }
    .ctrl-btn.reset:hover { background: rgba(201,169,106,0.12); color: #f1ddb1; border-color: #c9a96a; }
    .ctrl-btn svg { width: 14px; height: 14px; }

    /* ── Stats row ── */
    .stats-row { display: flex; justify-content: space-around; align-items: center; padding: 10px 0; border-top: 1px solid rgba(201,169,106,0.1); border-bottom: 1px solid rgba(201,169,106,0.1); }
    .stat-item { text-align: center; }
    .stat-label { font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 600; color: rgba(232,224,210,0.4); text-transform: uppercase; margin-bottom: 3px; }
    .stat-value { font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 700; color: #c9a96a; }
    .stat-value.chance { font-size: 1rem; }

    /* ── Last hero section ── */
    .last-hero-section { margin-top: 12px; padding: 12px; background: rgba(0,0,0,0.25); border: 1px solid rgba(201,169,106,0.1); }
    .last-hero-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .last-hero-title { font-family: 'Inter', sans-serif; font-size: 0.65rem; font-weight: 600; color: rgba(232,224,210,0.4); text-transform: uppercase; }
    .last-hero-actions { display: flex; gap: 5px; }
    .hero-btn { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: rgba(232,224,210,0.5); width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.18s; }
    .hero-btn:hover { opacity: 1; background: rgba(201,169,106,0.15); border-color: #c9a96a; color: #f1ddb1; }
    .hero-btn.delete:hover { background: rgba(255,71,87,0.2); border-color: #ff4757; color: #ff4757; }
    .hero-btn svg { width: 12px; height: 12px; }
    .last-hero-content { display: flex; flex-direction: column; gap: 8px; }
    .last-hero-display { display: flex; align-items: center; gap: 10px; }
    .last-hero-img { width: 38px; height: 38px; object-fit: cover; border: 1px solid rgba(201,169,106,0.35); }
    .last-hero-info { flex: 1; }
    .last-hero-name { font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; color: #e8e0d2; margin-bottom: 2px; }
    .last-hero-badge { display: inline-flex; align-items: center; background: rgba(201,169,106,0.1); border: 1px solid rgba(201,169,106,0.3); padding: 2px 8px; font-family: 'Inter', sans-serif; font-size: 0.68rem; font-weight: 600; color: #c9a96a; }
    .last-hero-input-wrapper { position: relative; }
    .hero-search-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(201,169,106,0.18); padding: 7px 10px; font-family: 'Inter', sans-serif; font-size: 0.8rem; color: #e8e0d2; outline: none; transition: border-color 0.2s; }
    .hero-search-input:focus { border-color: #c9a96a; }
    .hero-search-input::placeholder { color: rgba(255,255,255,0.25); }
    .hero-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: rgba(8,6,5,0.97); border: 1px solid rgba(201,169,106,0.35); max-height: 150px; overflow-y: auto; z-index: 100; display: none; margin-top: 2px; box-shadow: 0 8px 24px rgba(0,0,0,0.7); }
    .hero-suggestions.active { display: block; }
    .hero-suggestion { display: flex; align-items: center; gap: 10px; padding: 8px 10px; cursor: pointer; transition: background 0.15s; }
    .hero-suggestion:hover { background: rgba(201,169,106,0.08); }
    .hero-suggestion img { width: 28px; height: 28px; }
    .hero-suggestion span { font-family: 'Inter', sans-serif; font-size: 0.82rem; color: #e8e0d2; }
    .pull-input-row { display: flex; align-items: center; gap: 8px; }
    .pull-label { font-family: 'Inter', sans-serif; font-size: 0.72rem; color: rgba(232,224,210,0.4); }
    .pull-input { width: 55px; background: rgba(0,0,0,0.3); border: 1px solid rgba(201,169,106,0.18); padding: 4px 8px; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 600; color: #c9a96a; text-align: center; outline: none; transition: border-color 0.2s; }
    .pull-input:focus { border-color: #c9a96a; }

    /* ── Boosted states ── */
    .shard-card.boosted-ancient { border-color: #00c9ff !important; box-shadow: 0 0 16px rgba(0,201,255,0.2); }
    .shard-card.boosted-void    { border-color: #b000ff !important; box-shadow: 0 0 16px rgba(176,0,255,0.2); }
    .shard-card.boosted-primal  { border-color: #ff0040 !important; box-shadow: 0 0 16px rgba(255,0,64,0.2); }
    .shard-card.boosted-sacred  { border-color: #ffae00 !important; box-shadow: 0 0 16px rgba(255,174,0,0.2); }
    .boost-badge { background: rgba(201,169,106,0.12); border: 1px solid rgba(201,169,106,0.45); padding: 4px 10px; font-family: 'Inter', sans-serif; font-size: 0.68rem; font-weight: 700; color: #c9a96a; text-align: center; margin-top: 10px; }

    /* ── Ad banner ── */
    .ad-banner-footer { background: rgba(8,6,5,0.97) !important; border-top: 1px solid rgba(201,169,106,0.45) !important; box-shadow: 0 -4px 20px rgba(201,169,106,0.07) !important; box-sizing: content-box !important; }

    /* ── Keyframes ── */
    @keyframes orbDrift1  { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(12%,18%) scale(1.12); } }
    @keyframes orbDrift2  { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-18%,-12%) scale(1.18); } }
    @keyframes orbDrift3  { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-10%,8%) scale(0.88); } }
    @keyframes scratchShimmer { 0% { opacity: 0.55; } 100% { opacity: 1; } }
    @keyframes beamSweep  { 0% { transform: rotate(15deg) translateX(-80vw); opacity: 0; } 8% { opacity: 1; } 92% { opacity: 1; } 100% { transform: rotate(15deg) translateX(200vw); opacity: 0; } }
    @keyframes embersFloat { 0% { opacity: 0.4; transform: translate(0,0); } 100% { opacity: 0.9; transform: translate(0.5%,-0.5%); } }
    @keyframes borderGlow { 0%, 100% { opacity: 0.55; box-shadow: 0 0 6px rgba(201,169,106,0.15), inset 0 0 8px rgba(201,169,106,0.04); } 50% { opacity: 1; box-shadow: 0 0 14px rgba(201,169,106,0.35), inset 0 0 14px rgba(201,169,106,0.10); } }

    /* ── Responsive ── */
    @media (max-width: 1100px) { .shards-container { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 680px)  { .shards-container { grid-template-columns: 1fr; } }
  </style>
</head>

<div class="df-bg">

  <div class="df-orb df-orb-2"></div>

</div>

<div id="menu-container"></div>

</div>

<div class="main-container">
  <div class="df-panel">

    <!-- Ornements -->
    <svg class="ornament top-left" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">

      <line x1="9" y1="36" x2="18" y2="36" stroke="#c9a96a" stroke-width="1.5" opacity="0.65"/>
      <line x1="36" y1="9" x2="36" y2="18" stroke="#c9a96a" stroke-width="1.5" opacity="0.65"/>
    </svg>

      <polygon class="gem" points="9,0 18,9 9,18 0,9" fill="#c9a96a" opacity="0.92"/>
      <polygon points="9,4 14,9 9,14 4,9" fill="#f1ddb1" opacity="0.35"/>
      <path d="M 9 78 L 9 9 L 78 9" stroke="#c9a96a" stroke-width="2" stroke-linecap="square" opacity="0.78"/>
      <path class="sh-out" d="M 9 78 L 9 9 L 78 9" stroke="#f1ddb1" stroke-width="2" stroke-linecap="round"/>
      <line x1="9" y1="36" x2="18" y2="36" stroke="#c9a96a" stroke-width="1.5" opacity="0.65"/>

      <polygon points="9,4 14,9 9,14 4,9" fill="#f1ddb1" opacity="0.35"/>
      <path d="M 9 78 L 9 9 L 78 9" stroke="#c9a96a" stroke-width="2" stroke-linecap="square" opacity="0.78"/>

    <!-- Import -->
    <div class="section-label">Import Data</div>

      <input type="file" id="importFileInput" accept="text/plain,.ini,.txt">

        Import from RSL Helper

      <span class="import-hint">File location: <code>%appdata%/RslHelper/Config</code></span>

    <div class="section-divider"></div>

    <!-- Shards -->
    <div class="section-label">Shard Tracker</div>

<script>
(function() {
  const SIZE = 256;
  const c = document.createElement('canvas');
  c.width = c.height = SIZE;
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(SIZE, SIZE);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = (Math.random() * 255) | 0;
    img.data[i] = img.data[i+1] = img.data[i+2] = v;
    img.data[i+3] = (Math.random() * 36) | 0;
  }
  ctx.putImageData(img, 0, 0);
  const el = document.getElementById('df-noise');
  el.style.backgroundImage  = 'url(' + c.toDataURL() + ')';
  el.style.backgroundRepeat = 'repeat';
  el.style.backgroundSize   = SIZE + 'px ' + SIZE + 'px';
})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
<script src="/script.js"></script>
<script>
  const shards = [
    { type: "Ancient", max: 219, base: 0.5, start: 200, inc: 5, rslKey: "Ancient", rarity: "Leg" },
    { type: "Void",    max: 219, base: 0.5, start: 200, inc: 5, rslKey: "Void",    rarity: "Leg" },
    { type: "Primal",  max: 209, base: 0.5, start: 200, inc: 10, rslKey: "Prime",  rarity: "Myth" },
    { type: "Sacred",  max: 58,  base: 6,   start: 12,  inc: 2,  rslKey: "Sacred", rarity: "Leg" },
    { type: "Prism",   max: 51,  base: 6,   start: 20,  inc: 3,  rslKey: "Prism",  rarity: "Leg" },
    { type: "Remnant", max: 121, base: 2.5, start: 24,  inc: 1,  rslKey: "Remnant",rarity: "Myth" }
  ];

  let boostedRates = [];
  let championsDB = [];
  let cardSetProgressFunctions = {};

  async function loadChampionsDB() {
    try {
      const SQL = await initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}` });
      const response = await fetch(`/tools/champions-index/champions.db?v=${Date.now()}`);
      const buffer = await response.arrayBuffer();
      const db = new SQL.Database(new Uint8Array(buffer));
      const result = db.exec("SELECT id, name, image, rarity, IGid FROM champions;");
      if (result.length) {
        championsDB = result[0].values.map(r => ({ id: r[0], name: r[1], image: r[2], rarity: r[3], IGid: r[4] }));
      }
    } catch (err) { console.error("Error loading champions.db:", err); }
  }

  function findChampionByIGid(igId) {
    if (!igId) return null;
    const idStr = String(igId);
    return championsDB.find(c => c.IGid === idStr || c.IGid === idStr + "_f1" || String(c.IGid).startsWith(idStr));
  }

  function searchChampionsByName(query) {
    if (!query || query.length < 2) return [];
    const q = query.toLowerCase();
    return championsDB.filter(c => c.name.toLowerCase().includes(q)).slice(0, 8);
  }

  function parseINI(content) {
    const result = {};
    let currentSection = null;
    content.split(/\r?\n/).forEach(line => {
      line = line.trim();
      if (!line || line.startsWith(';') || line.startsWith('#')) return;
      const sectionMatch = line.match(/^\[(.+)\]$/);
      if (sectionMatch) { currentSection = sectionMatch[1]; result[currentSection] = {}; return; }
      const kvMatch = line.match(/^([^=]+)=(.*)$/);
      if (kvMatch && currentSection) result[currentSection][kvMatch[1].trim()] = kvMatch[2].trim();
    });
    return result;
  }

  function extractMercyData(iniData) {
    const mercySection = iniData['MercySystem'];
    if (!mercySection) return null;
    const data = {};
    const mapping = {
      Ancient: { value: 'AncientValueLeg', needFor: 'AncientNeedForLeg', lastHero: 'AncientValueLegLastHero' },
      Void:    { value: 'VoidValueLeg',    needFor: 'VoidNeedForLeg',    lastHero: 'VoidValueLegLastHero' },
      Sacred:  { value: 'SacredValueLeg',  needFor: 'SacredNeedForLeg',  lastHero: 'SacredValueLegLastHero' },
      Prism:   { value: 'PrismValueLeg',   needFor: 'PrismNeedForLeg',   lastHero: 'PrismValueLegLastHero' },
      Primal:  { value: 'PrimeValueMyth',  needFor: 'PrimeNeedForMyth',  lastHero: 'PrimeValueMythLastHero', legendaryValue: 'PrimeValueLeg' },
      Remnant: { value: 'RemnantValuetMyth',needFor:'RemnantNeedForMyth',lastHero: 'RemnantMythLastHero' }
    };
    for (const [type, keys] of Object.entries(mapping)) {
      data[type] = {};
      for (const [key, val] of Object.entries(mercySection)) {
        const cleanKey = key.replace(/^um\d+_/, '');
        if (cleanKey === keys.value) data[type].value = parseInt(val) || 0;
        if (keys.needFor && cleanKey === keys.needFor) data[type].needFor = parseInt(val) || 0;
        if (keys.lastHero && cleanKey === keys.lastHero) data[type].lastHeroId = val;
        if (keys.legendaryValue && cleanKey === keys.legendaryValue) data[type].legendaryValue = parseInt(val) || 0;
      }
    }
    return data;
  }

  function importRSLHelperData(mercyData) {
    for (const [type, data] of Object.entries(mercyData)) {
      if (data.value !== undefined) LS.setItem("pity_" + type, data.value);
      if (data.legendaryValue !== undefined) LS.setItem("pity_legendary_" + type, data.legendaryValue);
      if (data.lastHeroId) LS.setItem("lastHero_" + type, data.lastHeroId);
      if (data.needFor) LS.setItem("lastPull_" + type, data.needFor);
      if (cardSetProgressFunctions[type]) cardSetProgressFunctions[type](data.value || 0, data.legendaryValue);
      updateLastHeroDisplay(type);
    }
    lucide.createIcons();
  }

  function updateLastHeroDisplay(type) {
    const card = document.querySelector(`.shard-card[data-type="${type}"]`);
    if (!card) return;
    const lastHeroId = LS.getItem("lastHero_" + type);
    const lastPull = LS.getItem("lastPull_" + type);
    const displayContainer = card.querySelector('.last-hero-display');
    const inputWrapper = card.querySelector('.last-hero-input-wrapper');
    const pullInput = card.querySelector('.pull-input');
    if (!displayContainer) return;
    if (pullInput) pullInput.value = lastPull || '';
    if (lastHeroId) {
      const champion = findChampionByIGid(lastHeroId);
      displayContainer.innerHTML = champion
        ? `<img class="last-hero-img" src="/tools/champions-index/img/champions/${champion.image}.webp" alt="${champion.name}"><div class="last-hero-info"><div class="last-hero-name">${champion.name}</div>${lastPull ? `<span class="last-hero-badge">Pull #${lastPull}</span>` : ''}</div>`
        : `<div class="last-hero-info"><div class="last-hero-name">Champion ID: ${lastHeroId}</div>${lastPull ? `<span class="last-hero-badge">Pull #${lastPull}</span>` : ''}</div>`;
      displayContainer.style.display = 'flex';
      if (inputWrapper) inputWrapper.style.display = 'none';
    } else {
      displayContainer.style.display = 'none';
      if (inputWrapper) inputWrapper.style.display = 'block';
    }
  }

  async function loadBoostedRates() {
    try {
      const response = await fetch(`boosted_rates.json?v=${Date.now()}`);
      const data = await response.json();
      boostedRates = data.boostedRates.map(b => ({ ...b, start: new Date(b.start), end: new Date(b.end) }));
    } catch (err) { console.error("Error loading boosted_rates.json:", err); }
  }

  function getBoostedRate(type) {
    const now = new Date();
    return boostedRates.find(b => b.type === type && now >= b.start && now <= b.end) || null;
  }

  (async () => {
    await Promise.all([loadBoostedRates(), loadChampionsDB()]);
    const container = document.querySelector(".shards-container");
    const importBtn = document.getElementById('importRSLHelperBtn');
    const importInput = document.getElementById('importFileInput');

    importBtn.addEventListener('click', () => importInput.click());
    importInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const content = await file.text();
        const iniData = parseINI(content);
        const mercyData = extractMercyData(iniData);
        if (mercyData) { importRSLHelperData(mercyData); alert('Data imported successfully from RSL Helper!'); }
        else alert('[MercySystem] section not found in file. Make sure you selected the correct .ini file.');
      } catch (err) { console.error('Import error:', err); alert('Error importing file. Please check the file format.'); }
      importInput.value = '';
    });

    shards.forEach(shard => {
      const isPrimal = shard.type === "Primal";
      const rarityLabel = shard.rarity === 'Myth' ? 'Mythical' : 'Legendary';

      const dualRingsHTML = isPrimal ? `
        <div class="ring-wrapper">
          <div class="ring-container">
            <svg class="progress-ring-svg" width="100" height="100">
              <circle class="ring-bg" r="42" cx="50" cy="50"></circle>
              <circle class="ring-progress mythical-ring" r="42" cx="50" cy="50"></circle>
            </svg>
            <div class="ring-value"><input type="number" class="ring-input mythical-input" value="0" min="0"></div>
          </div>
          <span class="ring-label">Mythical</span>
        </div>
        <div class="ring-wrapper">
          <div class="ring-container">
            <svg class="progress-ring-svg" width="100" height="100">
              <circle class="ring-bg" r="42" cx="50" cy="50"></circle>
              <circle class="ring-progress legendary-ring" r="42" cx="50" cy="50"></circle>
            </svg>
            <div class="ring-value"><input type="number" class="ring-input legendary-input" value="0" min="0"></div>
          </div>
          <span class="ring-label">Legendary</span>
        </div>
      ` : `
        <div class="ring-wrapper">
          <div class="ring-container">
            <svg class="progress-ring-svg" width="100" height="100">
              <circle class="ring-bg" r="42" cx="50" cy="50"></circle>
              <circle class="ring-progress" r="42" cx="50" cy="50"></circle>
            </svg>
            <div class="ring-value"><input type="number" class="ring-input" value="0" min="0"></div>
          </div>
          <span class="ring-label">${rarityLabel}</span>
        </div>
      `;

      const controlsHTML = isPrimal ? `
        <div class="controls">
          <button class="ctrl-btn minus">−</button>
          <button class="ctrl-btn plus">+</button>
          <button class="ctrl-btn wide plus10">+10</button>
          <button class="ctrl-btn reset reset-myth" title="Reset Mythical"><i data-lucide="rotate-cw"></i></button>
          <button class="ctrl-btn reset reset-leg" title="Reset Legendary"><i data-lucide="rotate-cw"></i></button>
        </div>
      ` : `
        <div class="controls">
          <button class="ctrl-btn minus">−</button>
          <button class="ctrl-btn plus">+</button>
          ${["Ancient", "Void", "Prism"].includes(shard.type) ? '<button class="ctrl-btn wide plus10">+10</button>' : ''}
          <button class="ctrl-btn reset"><i data-lucide="rotate-cw"></i></button>
        </div>
      `;

      const statsHTML = isPrimal ? `
        <div class="stats-row">
          <div class="stat-item"><div class="stat-label">Pull</div><div class="stat-value count-display">0 / ${shard.max}</div></div>
          <div class="stat-item"><div class="stat-label">Myth %</div><div class="stat-value chance percent">${shard.base}%</div></div>
          <div class="stat-item"><div class="stat-label">Leg %</div><div class="stat-value chance legendary-percent">1%</div></div>
        </div>
      ` : `
        <div class="stats-row">
          <div class="stat-item"><div class="stat-label">Pull Count</div><div class="stat-value count-display">0 / ${shard.max}</div></div>
          <div class="stat-item"><div class="stat-label">${rarityLabel} Chance</div><div class="stat-value chance percent">${shard.base}%</div></div>
        </div>
      `;

      container.innerHTML += `
        <div class="shard-card" data-type="${shard.type}" data-max="${shard.max}" data-base="${shard.base}" data-start="${shard.start}" data-inc="${shard.inc}">
          <div class="card-header">
            <img class="shard-icon" src="/style/img/Misc/${shard.type}.webp" alt="${shard.type}">
            <div class="card-title-block">
              <div class="shard-name">${shard.type}</div>
              <div class="shard-type">Shard</div>
            </div>
          </div>
          <div class="progress-section">${dualRingsHTML}</div>
          ${controlsHTML}
          ${statsHTML}
          <div class="last-hero-section">
            <div class="last-hero-header">
              <span class="last-hero-title">Last ${rarityLabel}</span>
              <div class="last-hero-actions">
                <button class="hero-btn edit-btn" title="Edit"><i data-lucide="pencil"></i></button>
                <button class="hero-btn delete" title="Clear"><i data-lucide="trash-2"></i></button>
              </div>
            </div>
            <div class="last-hero-content">
              <div class="last-hero-display" style="display: none;"></div>
              <div class="last-hero-input-wrapper">
                <input type="text" class="hero-search-input" placeholder="Search champion...">
                <div class="hero-suggestions"></div>
              </div>
              <div class="pull-input-row">
                <span class="pull-label">Obtained at pull #</span>
                <input type="number" class="pull-input" placeholder="—" min="1">
              </div>
            </div>
          </div>
        </div>
      `;
    });

    document.querySelectorAll('.shard-card').forEach(card => {
      const type = card.dataset.type;
      const base = parseFloat(card.dataset.base);
      const start = parseInt(card.dataset.start);
      const inc = parseFloat(card.dataset.inc);
      const boost = getBoostedRate(type);
      let max = parseInt(card.dataset.max);

      if (boost) {
        const boostedMax = Math.ceil((100 - base) / (inc * boost.boost)) + (start - 1);
        max = Math.min(max, boostedMax);
        switch (type) {
          case "Ancient": card.classList.add("boosted-ancient"); break;
          case "Void":    card.classList.add("boosted-void");    break;
          case "Primal":  card.classList.add("boosted-primal");  break;
          case "Sacred":  card.classList.add("boosted-sacred");  break;
        }
        const badge = document.createElement('div');
        badge.className = 'boost-badge';
        badge.textContent = `Boosted Rate Active ×${boost.boost}`;
        card.appendChild(badge);
      }

      const isPrimal = type === "Primal";
      const inputCircle = isPrimal ? card.querySelector('.mythical-input') : card.querySelector('.ring-input');
      const countDisplay = card.querySelector('.count-display');
      const plus = card.querySelector('.plus');
      const minus = card.querySelector('.minus');
      const plus10 = card.querySelector('.plus10');
      const reset = isPrimal ? null : card.querySelector('.reset');
      const resetMyth = isPrimal ? card.querySelector('.reset-myth') : null;
      const resetLeg  = isPrimal ? card.querySelector('.reset-leg')  : null;
      const percent = card.querySelector('.percent');
      const circle = isPrimal ? card.querySelector('.mythical-ring') : card.querySelector('.ring-progress');
      const radius = 42;
      const circumference = 2 * Math.PI * radius;
      circle.style.strokeDasharray = circumference;

      let value = parseInt(LS.getItem("pity_" + type)) || 0;
      let legendaryCircle, legendaryInput, legendaryPercent, legendaryValue;
      const legendaryMax = 174;
      if (isPrimal) {
        legendaryCircle = card.querySelector('.legendary-ring');
        legendaryInput  = card.querySelector('.legendary-input');
        legendaryPercent = card.querySelector('.legendary-percent');
        legendaryCircle.style.strokeDasharray = circumference;
        legendaryValue = parseInt(LS.getItem("pity_legendary_" + type)) || 0;
      }

      const heroInput = card.querySelector('.hero-search-input');
      const heroSuggestions = card.querySelector('.hero-suggestions');
      const editBtn = card.querySelector('.edit-btn');
      const deleteBtn = card.querySelector('.delete');
      const heroDisplay = card.querySelector('.last-hero-display');
      const heroInputWrapper = card.querySelector('.last-hero-input-wrapper');
      const pullInput = card.querySelector('.pull-input');

      heroInput.addEventListener('input', () => {
        const matches = searchChampionsByName(heroInput.value);
        heroSuggestions.innerHTML = '';
        if (matches.length > 0) {
          heroSuggestions.classList.add('active');
          matches.forEach(champ => {
            const item = document.createElement('div');
            item.className = 'hero-suggestion';
            item.innerHTML = `<img src="/tools/champions-index/img/champions/${champ.image}.webp" alt="${champ.name}"><span>${champ.name}</span>`;
            item.addEventListener('click', () => {
              LS.setItem("lastHero_" + type, champ.IGid || champ.id);
              heroInput.value = '';
              heroSuggestions.classList.remove('active');
              updateLastHeroDisplay(type);
              lucide.createIcons();
            });
            heroSuggestions.appendChild(item);
          });
        } else { heroSuggestions.classList.remove('active'); }
      });
      heroInput.addEventListener('blur', () => { setTimeout(() => heroSuggestions.classList.remove('active'), 200); });
      editBtn.addEventListener('click', () => { heroDisplay.style.display = 'none'; heroInputWrapper.style.display = 'block'; heroInput.focus(); });
      deleteBtn.addEventListener('click', () => { LS.removeItem("lastHero_" + type); LS.removeItem("lastPull_" + type); heroDisplay.style.display = 'none'; heroInputWrapper.style.display = 'block'; pullInput.value = ''; lucide.createIcons(); });
      pullInput.addEventListener('change', () => {
        const pullValue = pullInput.value;
        if (pullValue && parseInt(pullValue) > 0) LS.setItem("lastPull_" + type, pullValue);
        else LS.removeItem("lastPull_" + type);
        updateLastHeroDisplay(type);
      });
      updateLastHeroDisplay(type);

      function calcChance(v) { let rate = v < start ? base : Math.min(base + (v - start + 1) * inc, 100); if (boost) rate = Math.min(rate * boost.boost, 100); return rate; }
      function calcLegendaryChance(v) { if (v < 75) return 1; return Math.min(1 + (v - 75 + 1) * 1, 100); }
      function updateButtons(v, legV) {
        if (isPrimal) { minus.disabled = v <= 0 && legV <= 0; plus.disabled = v >= max && legV >= legendaryMax; }
        else { minus.disabled = v <= 0; plus.disabled = v >= max; }
      }
      function setProgress(v, legV = null) {
        v = Math.max(0, Math.min(max, v));
        circle.style.strokeDashoffset = circumference - (v / max) * circumference;
        inputCircle.value = v;
        countDisplay.textContent = `${v} / ${max}`;
        percent.textContent = calcChance(v).toFixed(2) + "%";
        LS.setItem("pity_" + type, v);
        if (isPrimal && legV !== null) {
          legV = Math.max(0, Math.min(legendaryMax, legV));
          legendaryCircle.style.strokeDashoffset = circumference - (legV / legendaryMax) * circumference;
          legendaryInput.value = legV;
          legendaryPercent.textContent = calcLegendaryChance(legV).toFixed(2) + "%";
          LS.setItem("pity_legendary_" + type, legV);
          updateButtons(v, legV);
        } else { updateButtons(v, legendaryValue); }
      }
      cardSetProgressFunctions[type] = setProgress;

      function setLegendaryProgress(legV) {
        legV = Math.max(0, Math.min(legendaryMax, legV));
        legendaryCircle.style.strokeDashoffset = circumference - (legV / legendaryMax) * circumference;
        legendaryInput.value = legV;
        legendaryPercent.textContent = calcLegendaryChance(legV).toFixed(2) + "%";
        LS.setItem("pity_legendary_" + type, legV);
        legendaryValue = legV;
        updateButtons(value, legV);
      }

      function holdButton(btn, action) {
        let interval, timeout;
        const startHold = () => { action(); timeout = setTimeout(() => { interval = setInterval(action, 50); }, 400); };
        const stopHold  = () => { clearTimeout(timeout); clearInterval(interval); };
        btn.addEventListener('mousedown', startHold);
        btn.addEventListener('mouseup', stopHold);
        btn.addEventListener('mouseleave', stopHold);
        btn.addEventListener('touchstart', e => { e.preventDefault(); startHold(); }, { passive: false });
        btn.addEventListener('touchend', stopHold);
        btn.addEventListener('touchcancel', stopHold);
      }

      if (isPrimal) {
        holdButton(plus,  () => { if (value < max || legendaryValue < legendaryMax) { if (value < max) value++; if (legendaryValue < legendaryMax) legendaryValue++; setProgress(value, legendaryValue); } });
        holdButton(minus, () => { if (value > 0 || legendaryValue > 0) { if (value > 0) value--; if (legendaryValue > 0) legendaryValue--; setProgress(value, legendaryValue); } });
        if (plus10) plus10.onclick = () => { value = Math.min(value + 10, max); legendaryValue = Math.min(legendaryValue + 10, legendaryMax); setProgress(value, legendaryValue); };
        resetMyth.onclick = () => { value = 0; setProgress(0, legendaryValue); };
        resetLeg.onclick  = () => { legendaryValue = 0; setLegendaryProgress(0); };
        inputCircle.oninput  = () => setProgress(value = parseInt(inputCircle.value) || 0, legendaryValue);
        legendaryInput.oninput = () => setLegendaryProgress(parseInt(legendaryInput.value) || 0);
        setProgress(value, legendaryValue);
      } else {
        holdButton(plus,  () => { if (value < max) setProgress(++value); });
        holdButton(minus, () => { if (value > 0) setProgress(--value); });
        if (plus10) plus10.onclick = () => { value = Math.min(value + 10, max); setProgress(value); };
        reset.onclick = () => setProgress(value = 0);
        inputCircle.oninput = () => setProgress(value = parseInt(inputCircle.value) || 0);
        setProgress(value);
      }
    });

    lucide.createIcons();
  })();
</script>
<script src="/config/session-widget.js"></script>

</body>
