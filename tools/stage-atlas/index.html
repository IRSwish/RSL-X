<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HNK5S7EBCJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HNK5S7EBCJ');
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
  <script src="https://unpkg.com/lucide@latest" defer onload="lucide.createIcons()"></script>

  <script src="/config/site-config.js"></script>
  <script src="/config/ad-banner.js" defer></script>
  <script>document.title = "Stage Atlas | " + window.siteConfig.title;</script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style/style.css">
  <link rel="stylesheet" href="/tools/stage-atlas/style.css">
</head>
<body>

  <!-- ── Menu ─────────────────────────────────────────────────────────── -->
  <div id="menu-placeholder"></div>
  <script>
    fetch('/menu.html').then(r => r.text()).then(html => {
      document.getElementById('menu-placeholder').outerHTML = html;
      if (window.lucide) lucide.createIcons();
    });
  </script>

  <!-- ── Layout ────────────────────────────────────────────────────────── -->
  <div id="atlas-wrapper">

    <!-- Zone nav (big cards → compact strip on first click) -->
    <div id="zone-nav" class="zone-nav"></div>

    <!-- Navigation strips (slide in as you drill down) -->
    <div class="nav-strips">

      <!-- Sub-area: Clan Boss / Hydra / Chimera -->
      <div class="nav-strip" id="sub-area-section">
        <span class="nav-strip-label" id="sub-area-label">Boss Type</span>
        <div id="sub-area-list" class="strip-list"></div>
      </div>

      <!-- Region / Chapter -->
      <div class="nav-strip" id="region-section">
        <span class="nav-strip-label">Region</span>
        <div id="region-list" class="strip-list"></div>
        <span id="region-name-display" class="region-name-display"></span>
      </div>

      <!-- Affinity (Iron Twins / Potion Keeps) -->
      <div class="nav-strip" id="affinity-section">
        <span class="nav-strip-label" id="affinity-label">Affinity</span>
        <div id="affinity-list" class="strip-list"></div>
      </div>

      <!-- Difficulty -->
      <div class="nav-strip" id="diff-section">
        <span class="nav-strip-label">Difficulty</span>
        <div id="diff-buttons" class="strip-list diff-buttons"></div>
      </div>

      <!-- Stages -->
      <div class="nav-strip nav-strip--stages" id="stage-section">
        <span class="nav-strip-label" id="stage-section-label">Stages</span>
        <div id="stage-list" class="strip-list stage-list"></div>
      </div>

    </div>

    <!-- Main content (full width) -->
    <main class="atlas-main">
      <div id="main-placeholder" class="main-placeholder">
        <div class="placeholder-icon"><i data-lucide="map"></i></div>
        <div class="placeholder-text">Select a stage to view enemy data</div>
      </div>
      <div id="stage-view" style="display:none">
        <div class="stage-actions">
          <button id="share-btn" class="action-btn" title="Copy link">
            <i data-lucide="link"></i><span class="action-label">Copy link</span>
          </button>
          <button id="fav-stage-btn" class="action-btn" title="Add to favorites">
            <i data-lucide="star"></i><span class="action-label">Add to favorites</span>
          </button>
        </div>
        <div id="stage-req" class="stage-req"></div>
        <div id="waves-container" class="waves-container"></div>
      </div>
    </main>

  </div><!-- /atlas-wrapper -->

  <!-- ── Favorites FAB ─────────────────────────────────────────────────── -->
  <button id="fav-fab" class="fav-fab" title="Favorites">
    <i data-lucide="star"></i>
    <span id="fav-count" class="fav-count" style="display:none"></span>
  </button>

  <!-- ── Favorites Modal ───────────────────────────────────────────────── -->
  <div id="fav-modal" class="fav-modal-overlay" style="display:none">
    <div class="fav-modal">
      <div class="fav-modal-head">
        <span class="fav-modal-title">Favorites</span>
        <button id="fav-modal-close" class="fav-modal-close"><i data-lucide="x"></i></button>
      </div>
      <div id="fav-list" class="fav-list">
        <div class="fav-empty">No favorites yet.<br>Browse a stage and click the ★ to save it.</div>
      </div>
      <div class="fav-modal-footer">
        <em>Your favorites are stored locally in your browser — clearing your cache will reset them.</em>
      </div>
    </div>
  </div>

  <!-- ── Enemy Modal ──────────────────────────────────────────────────── -->
  <div id="enemy-modal" class="enemy-modal-overlay">
    <div class="enemy-modal-content">
      <button class="enemy-modal-close" id="enemy-modal-close">×</button>
      <div class="enemy-modal-top">

        <!-- Portrait -->
        <div class="enemy-modal-portrait-col">
          <div id="em-portrait" class="card-portrait">
            <img id="em-img" class="portrait-img" src="" alt=""
                 onerror="this.style.display='none';document.getElementById('em-fallback').style.display='flex'">
            <div id="em-fallback" class="portrait-fallback" style="display:none"></div>
            <img id="em-frame" class="portrait-frame" src="" alt="" onerror="this.style.display='none'">
            <img id="em-affinity" class="portrait-affinity" src="" alt="" onerror="this.style.display='none'">
          </div>
          <div id="em-name" class="em-name"></div>
          <div id="em-meta" class="em-meta"></div>
        </div>

        <!-- Stats -->
        <div class="enemy-modal-stats-col">
          <div id="em-stats-title" class="em-stats-title"></div>
          <div class="em-stat-row"><span class="em-stat-label">HP</span><span class="em-stat-value em-hp" id="em-hp"></span></div>
          <div class="em-stat-row"><span class="em-stat-label">ATK</span><span class="em-stat-value" id="em-atk"></span></div>
          <div class="em-stat-row"><span class="em-stat-label">DEF</span><span class="em-stat-value" id="em-def"></span></div>
          <div class="em-stat-row"><span class="em-stat-label">SPD</span><span class="em-stat-value" id="em-spd"></span></div>
          <div class="em-stat-row"><span class="em-stat-label">C.Rate</span><span class="em-stat-value" id="em-crate"></span></div>
          <div class="em-stat-row"><span class="em-stat-label">C.Dmg</span><span class="em-stat-value" id="em-cdmg"></span></div>
          <div class="em-stat-row"><span class="em-stat-label">RES</span><span class="em-stat-value em-res" id="em-res"></span></div>
          <div class="em-stat-row"><span class="em-stat-label">ACC</span><span class="em-stat-value em-acc" id="em-acc"></span></div>
        </div>

      </div>
      <div class="em-separator"></div>
      <div id="em-skills" class="em-skills"></div>
    </div>
  </div>

<script src="/tools/stage-atlas/script.js"></script>
</body>
</html>
